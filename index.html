<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swap & Bridge UI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0b0614;
      font-family: "Instrument Sans", sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      padding: 44px 16px;
    }

    button,
    input {
      font-family: inherit;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 56px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .logo::before {
      content: "";
      position: absolute;
      width: 17px;
      height: 17px;
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      border-radius: 4px;
      transform: rotate(45deg);
      top: 2px;
      left: 2px;
    }

    .logo::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 36px;
      background: linear-gradient(135deg, #c084fc, #7c3aed);
      border-radius: 5px;
      transform: rotate(45deg);
      top: 13px;
      left: 13px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #b99cff;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .connect-top {
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #8750e6, #6d28d9);
      color: #fff;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .menu {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      padding: 4px;
    }

    .menu span {
      width: 28px;
      height: 3px;
      background: #e7ddff;
      border-radius: 20px;
    }

    .apy-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .apy {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #221333;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 12px 20px;
      box-shadow: inset 0 0 24px rgba(168, 85, 247, 0.08);
      color: #d9c8ff;
      font-size: 16px;
      font-weight: 800;
    }

    .apy-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2e1a45;
      display: grid;
      place-items: center;
      color: #b66cff;
      font-weight: 900;
    }

    .card {
      background: linear-gradient(180deg, #1a0f2b 0%, #120b20 100%);
      border: 1px solid rgba(124, 58, 237, 0.12);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .settings {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
    }

    .chain-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      position: relative;
      margin-bottom: 18px;
    }

    .select-card {
      min-height: 116px;
      background: #26143d;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      cursor: pointer;
      position: relative;
      width: 100%;
    }

    .select-card:hover,
    .token-btn:hover {
      background: #2d1848;
    }

    .label {
      font-size: 20px;
      color: #fff;
      font-weight: 900;
      margin-bottom: 24px;
    }

    .select-content {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .coin {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #313154;
      position: relative;
      flex-shrink: 0;
    }

    .coin::after {
      content: "";
      position: absolute;
      right: -4px;
      bottom: 0;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #39345f;
      border: 4px solid #26143d;
    }

    .select-text {
      font-size: 26px;
      font-weight: 700;
      color: #d9cfee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flip {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -35%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #211231;
      border: 5px solid #180d29;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-card {
      background: #26143d;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 22px;
    }

    .send-bottom {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .amount-area {
      flex: 1;
      min-width: 0;
    }

    .amount-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 40px;
      font-weight: 900;
      line-height: 1;
    }

    .amount-input::placeholder {
      color: #d9cfee;
    }

    .usd-value {
      color: #d7c8ef;
      font-size: 17px;
      margin-top: 6px;
      font-weight: 600;
    }

    .cta-row {
      display: grid;
      grid-template-columns: 1fr 74px;
      gap: 18px;
    }

    .main-cta {
      height: 72px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #7c3aed 0%, #6d28d9 100%);
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.28);
    }

    .wallet-btn {
      width: 74px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: #4b2b80;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropdown-wrap {
      position: relative;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #1c102d;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      overflow: hidden;
      z-index: 30;
      box-shadow: 0 18px 40px rgba(0,0,0,0.4);
      display: none;
    }

    .dropdown.show {
      display: block;
    }

    .dropdown button {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
    }

    .dropdown button:hover {
      background: #2d1848;
    }

    .dropdown small {
      color: #9c8abf;
      font-weight: 700;
    }

    @media (max-width: 430px) {
      body {
        padding: 36px 14px;
      }

      .brand-name {
        font-size: 28px;
      }

      .logo {
        width: 42px;
        height: 42px;
      }

      .connect-top {
        padding: 13px 20px;
        font-size: 15px;
      }

      .card-title {
        font-size: 31px;
      }

      .select-text {
        font-size: 23px;
      }

      .chain-row {
        gap: 14px;
      }

      .select-card {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <header class="header">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-name">JUMPER</div>
      </div>

      <div class="header-actions">
        <button class="connect-top" id="topConnectBtn">Connect</button>

        <button class="menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="apy-wrap">
      <div class="apy">
        <div class="apy-icon">›</div>
        <span>Earn 10%+ APY on Jumper</span>
      </div>
    </div>

    <section class="card">
      <div class="card-header">
        <h1 class="card-title">Swap & Bridge</h1>
        <button class="settings">⚙</button>
      </div>

      <div class="chain-row">

        <div class="dropdown-wrap">
          <button class="select-card" data-dropdown="fromDropdown">
            <div class="label">From</div>
            <div class="select-content">
              <div class="coin"></div>
              <div class="select-text" id="fromText">Select...</div>
            </div>
          </button>

          <div class="dropdown" id="fromDropdown"></div>
        </div>

        <button class="flip" id="flipBtn">→</button>

        <div class="dropdown-wrap">
          <button class="select-card" data-dropdown="toDropdown">
            <div class="label">To</div>
            <div class="select-content">
              <div class="coin"></div>
              <div class="select-text" id="toText">Select...</div>
            </div>
          </button>

          <div class="dropdown" id="toDropdown"></div>
        </div>

      </div>

      <div class="send-card">
        <div class="label">Send</div>

        <div class="send-bottom">
          <div class="coin"></div>

          <div class="amount-area">
            <input class="amount-input" id="amountInput" type="text" placeholder="0" inputmode="decimal" />
            <div class="usd-value" id="usdValue">$0.00</div>
          </div>
        </div>
      </div>

      <div class="cta-row">
        <button class="main-cta" id="mainCta">Connect wallet</button>

        <button class="wallet-btn">
          <svg width="32" height="26" viewBox="0 0 32 26" fill="none">
            <rect x="3" y="6" width="26" height="16" rx="4" stroke="white" stroke-width="3"/>
            <path d="M6 11H26" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <path d="M20 16H25" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </section>

  </main>

  <script>
    const CHAINS = [
      { id: "eth", name: "Ethereum", symbol: "ETH" },
      { id: "arb", name: "Arbitrum", symbol: "ARB" },
      { id: "base", name: "Base", symbol: "BASE" },
      { id: "poly", name: "Polygon", symbol: "MATIC" },
      { id: "op", name: "Optimism", symbol: "OP" },
    ];

    let fromChain = null;
    let toChain = null;
    let connected = false;

    const fromText = document.getElementById("fromText");
    const toText = document.getElementById("toText");
    const fromDropdown = document.getElementById("fromDropdown");
    const toDropdown = document.getElementById("toDropdown");
    const amountInput = document.getElementById("amountInput");
    const usdValue = document.getElementById("usdValue");
    const mainCta = document.getElementById("mainCta");
    const topConnectBtn = document.getElementById("topConnectBtn");
    const flipBtn = document.getElementById("flipBtn");

    function renderDropdown(dropdown, type) {
      dropdown.innerHTML = "";

      CHAINS.forEach(chain => {
        const btn = document.createElement("button");

        btn.innerHTML = `
          <span>${chain.name}</span>
          <small>${chain.symbol}</small>
        `;

        btn.onclick = () => {
          if (type === "from") {
            fromChain = chain;
            fromText.textContent = chain.name;
          } else {
            toChain = chain;
            toText.textContent = chain.name;
          }

          closeDropdowns();
          updateCta();
        };

        dropdown.appendChild(btn);
      });
    }

    renderDropdown(fromDropdown, "from");
    renderDropdown(toDropdown, "to");

    function closeDropdowns() {
      fromDropdown.classList.remove("show");
      toDropdown.classList.remove("show");
    }

    document.querySelectorAll("[data-dropdown]").forEach(button => {
      button.addEventListener("click", e => {
        e.stopPropagation();

        const dropdownId = button.dataset.dropdown;
        const dropdown = document.getElementById(dropdownId);
        const isOpen = dropdown.classList.contains("show");

        closeDropdowns();

        if (!isOpen) {
          dropdown.classList.add("show");
        }
      });
    });

    document.addEventListener("click", closeDropdowns);

    amountInput.addEventListener("input", e => {
      let value = e.target.value.replace(/[^0-9.]/g, "");

      const parts = value.split(".");
      if (parts.length > 2) {
        value = parts[0] + "." + parts.slice(1).join("");
      }

      e.target.value = value;

      const number = parseFloat(value || "0");
      usdValue.textContent = "$" + number.toFixed(2);

      updateCta();
    });

    function connectWallet() {
      connected = true;
      topConnectBtn.textContent = "Connected";
      mainCta.textContent = "Swap & Bridge";
      updateCta();
    }

    topConnectBtn.addEventListener("click", connectWallet);
    mainCta.addEventListener("click", () => {
      if (!connected) {
        connectWallet();
      }
    });

    flipBtn.addEventListener("click", e => {
      e.stopPropagation();

      const oldFrom = fromChain;
      fromChain = toChain;
      toChain = oldFrom;

      fromText.textContent = fromChain ? fromChain.name : "Select...";
      toText.textContent = toChain ? toChain.name : "Select...";

      updateCta();
    });

    function updateCta() {
      const amount = parseFloat(amountInput.value || "0");

      if (!connected) {
        mainCta.textContent = "Connect wallet";
        return;
      }

      if (!fromChain || !toChain || amount <= 0) {
        mainCta.textContent = "Select route";
        return;
      }

      mainCta.textContent = "Swap & Bridge";
    }
  </script>
</body>
</html>
